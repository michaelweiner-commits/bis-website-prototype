<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<meta name="robots" content="noindex,nofollow"/>
<title>Bureau of Industry and Security — Prototype</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet"/>
<script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script crossorigin src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#000;
  --bg-alt:#0a0a0a;
  --bg-elev:#141414;
  --bg-card:#1a1a1a;
  --line:rgba(255,255,255,.08);
  --line-strong:rgba(255,255,255,.16);
  --text:#f5f5f5;
  --text-dim:#a0a0a0;
  --text-dimmer:#6b6b6b;
  --accent:#c8102e;
  --accent-soft:rgba(200,16,46,.14);
  --success:#3fb950;
  --amber:#e3a72f;
  --sky:#5aa9ff;
  --nav-h:64px;
}
html{scroll-behavior:smooth}
body{
  font-family:'Inter',system-ui,-apple-system,BlinkMacSystemFont,sans-serif;
  background:var(--bg);color:var(--text);
  line-height:1.55;-webkit-font-smoothing:antialiased;
  -moz-osx-font-smoothing:grayscale;
  letter-spacing:-.005em;
}
button{font-family:inherit;cursor:pointer;border:none;background:none;color:inherit}
a{color:inherit;text-decoration:none}
input,textarea,select{font-family:inherit;color:inherit}

/* ============ PROTOTYPE BANNER ============ */
.proto-banner{
  position:fixed;top:0;left:0;right:0;z-index:110;
  background:rgba(227,167,47,.14);color:#e8c98a;
  border-bottom:1px solid rgba(227,167,47,.18);
  font-size:11px;font-weight:600;letter-spacing:1.5px;text-transform:uppercase;
  padding:6px 20px;text-align:center;
  backdrop-filter:blur(8px);-webkit-backdrop-filter:blur(8px);
}
.proto-banner span{opacity:.75;font-weight:500;text-transform:none;letter-spacing:.3px;margin-left:8px;color:rgba(232,201,138,.75)}

/* ============ NAV ============ */
.nav{
  position:fixed;top:26px;left:0;right:0;height:var(--nav-h);
  background:rgba(0,0,0,.72);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);
  border-bottom:1px solid var(--line);
  z-index:100;display:flex;align-items:center;
  padding:0 40px;
}
.nav-inner{
  max-width:1400px;margin:0 auto;width:100%;
  display:flex;align-items:center;justify-content:space-between;gap:32px;
}
.nav-brand{
  font-weight:800;font-size:15px;letter-spacing:.5px;cursor:pointer;
  display:flex;align-items:center;gap:10px;
}
.nav-brand-mark{
  width:26px;height:26px;border-radius:6px;
  background:linear-gradient(135deg,#fff 0%,#bbb 100%);
  display:flex;align-items:center;justify-content:center;
  color:#000;font-weight:900;font-size:11px;letter-spacing:0;
}
.nav-links{display:flex;gap:6px;align-items:center;flex:1;justify-content:center}
.nav-link{
  padding:8px 14px;font-size:13px;font-weight:500;
  color:var(--text-dim);cursor:pointer;border-radius:6px;transition:all .15s;
}
.nav-link:hover{color:var(--text);background:rgba(255,255,255,.04)}
.nav-link.active{color:var(--text)}
.nav-actions{display:flex;gap:10px;align-items:center}
.nav-btn{
  padding:8px 16px;font-size:13px;font-weight:600;border-radius:6px;
  transition:all .15s;
}
.nav-btn-ghost{color:var(--text-dim)}
.nav-btn-ghost:hover{color:var(--text)}
.nav-btn-primary{background:#fff;color:#000}
.nav-btn-primary:hover{background:#e5e5e5}
.nav-btn-primary.signedin{background:transparent;border:1px solid var(--line-strong);color:var(--text);padding-left:10px}
.nav-avatar{width:22px;height:22px;border-radius:50%;background:linear-gradient(135deg,#3a3a3a,#5c5c5c);display:inline-flex;align-items:center;justify-content:center;font-size:10px;font-weight:700;margin-right:6px;color:#fff}

.page{padding-top:calc(var(--nav-h) + 26px);min-height:100vh}

/* ============ HERO / LANDING ============ */
.hero{
  min-height:calc(100vh - var(--nav-h));
  display:grid;grid-template-columns:minmax(0,1.05fr) minmax(0,1fr);gap:60px;align-items:center;
  padding:80px 60px 120px;position:relative;overflow:hidden;
  background:
    radial-gradient(ellipse at 25% 50%,rgba(90,169,255,.08) 0%,transparent 55%),
    radial-gradient(ellipse at 85% 60%,rgba(200,16,46,.05) 0%,transparent 55%),
    #000;
}
.hero-left{position:relative;z-index:3;max-width:640px}
.hero-right{position:relative;height:100%;min-height:540px;display:flex;align-items:center;justify-content:center}
.hero-eyebrow{
  font-size:11px;font-weight:600;letter-spacing:4px;text-transform:uppercase;
  color:var(--text-dimmer);margin-bottom:24px;
  opacity:0;animation:heroFadeIn .8s cubic-bezier(.2,.7,.2,1) forwards;
}
.hero-eyebrow .dot{display:inline-block;width:6px;height:6px;border-radius:50%;background:var(--success);margin-right:8px;box-shadow:0 0 12px rgba(63,185,80,.7);vertical-align:middle;margin-bottom:2px}
.hero-left h1{
  font-size:clamp(46px,6.4vw,82px);font-weight:800;line-height:1.03;letter-spacing:-.03em;
  margin-bottom:28px;text-align:left;
}
.hero-line{display:inline-block;opacity:0;transform:translateY(24px);animation:heroLineIn .9s cubic-bezier(.2,.7,.2,1) forwards;animation-delay:.1s}
.hero-line-2{animation-delay:.25s}
.hero-cycler{display:inline-block;opacity:0;transform:translateY(24px);animation:heroLineIn .9s cubic-bezier(.2,.7,.2,1) forwards;animation-delay:.25s;position:relative;min-width:1px}
.hero-cycler-word{display:inline-block;background:linear-gradient(90deg,#fff 0%,#a8b8c8 100%);-webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent;animation:wordSwap .7s cubic-bezier(.2,.7,.2,1)}
@keyframes heroFadeIn{to{opacity:1}}
@keyframes heroLineIn{to{opacity:1;transform:translateY(0)}}
@keyframes wordSwap{0%{opacity:0;transform:translateY(18px);filter:blur(8px)}100%{opacity:1;transform:translateY(0);filter:blur(0)}}
.hero-sub{
  font-size:19px;font-weight:400;color:var(--text-dim);
  max-width:560px;margin-bottom:44px;line-height:1.5;text-align:left;
  opacity:0;transform:translateY(24px);animation:heroLineIn .9s cubic-bezier(.2,.7,.2,1) forwards;animation-delay:.4s;
}
.hero-ctas{display:flex;gap:14px;flex-wrap:wrap;justify-content:flex-start;
  opacity:0;transform:translateY(24px);animation:heroLineIn .9s cubic-bezier(.2,.7,.2,1) forwards;animation-delay:.55s;
}

/* Hero turnstile — three panels rotating through BIS mission pillars */
.hero-turnstile{position:relative;width:100%;height:100%;max-height:640px;opacity:0;animation:heroFadeIn 1.6s cubic-bezier(.2,.7,.2,1) forwards;animation-delay:.35s}
.hero-panel{position:absolute;inset:0;display:flex;flex-direction:column;align-items:stretch;opacity:0;transition:opacity .8s cubic-bezier(.4,0,.2,1),transform 1s cubic-bezier(.4,0,.2,1);pointer-events:none;transform:scale(.96);padding-bottom:96px}
.hero-panel.active{opacity:1;pointer-events:auto;transform:scale(1)}
.hero-panel-viz{flex:1;min-height:0;display:flex;align-items:center;justify-content:center}
.hero-panel-caption{position:absolute;bottom:44px;left:0;right:0;text-align:center;pointer-events:none;padding:0 24px}
.hero-panel-eyebrow{font-size:10px;font-weight:600;letter-spacing:3.5px;text-transform:uppercase;color:var(--text-dimmer);margin-bottom:8px;transition:opacity .6s;opacity:0}
.hero-panel.active .hero-panel-eyebrow{opacity:1;transition-delay:.4s}
.hero-panel-caption-title{font-size:17px;font-weight:600;color:rgba(255,255,255,.9);letter-spacing:-.01em;opacity:0;transition:opacity .6s,transform .6s}
.hero-panel.active .hero-panel-caption-title{opacity:1;transform:translateY(0);transition-delay:.55s}
.hero-panel:not(.active) .hero-panel-caption-title{transform:translateY(8px)}

.turnstile-dots{position:absolute;bottom:14px;left:50%;transform:translateX(-50%);display:flex;gap:10px;z-index:5}
.turnstile-dot{width:24px;height:2px;background:rgba(255,255,255,.15);border-radius:2px;cursor:pointer;transition:background .3s;position:relative;overflow:hidden}
.turnstile-dot.active{background:rgba(255,255,255,.2)}
.turnstile-dot.active::after{content:'';position:absolute;inset:0;background:#fff;transform-origin:left;animation:dotFill 6s linear forwards}
@keyframes dotFill{from{transform:scaleX(0)}to{transform:scaleX(1)}}

.hero-viz{width:100%;height:100%;max-height:100%;overflow:visible}

/* Concentric rings around the hub */
.flow-ring{fill:none;stroke:rgba(255,255,255,.05);stroke-width:.8}
.flow-ring.dashed{stroke-dasharray:2 5;stroke:rgba(255,255,255,.07)}

/* Radiating pulse waves from hub */
.hub-pulse{fill:none;stroke:rgba(255,255,255,.14);stroke-width:1;animation:hubPulse 4.5s ease-out infinite}
.hub-pulse.d1{animation-delay:1.5s}
.hub-pulse.d2{animation-delay:3s}
@keyframes hubPulse{0%{r:22;opacity:.7}100%{r:220;opacity:0}}

/* The central hub */
.hub-core{fill:#1a1a1a;stroke:rgba(255,255,255,.2);stroke-width:1;filter:drop-shadow(0 0 20px rgba(255,255,255,.08))}
.hub-inner{fill:none}
.hub-label{fill:#fff;font-family:'Inter',sans-serif;font-size:11px;font-weight:700;letter-spacing:2px;text-transform:uppercase;text-anchor:middle;dominant-baseline:middle}
.hub-sublabel{fill:rgba(255,255,255,.45);font-family:'Inter',sans-serif;font-size:8px;font-weight:500;letter-spacing:2.5px;text-transform:uppercase;text-anchor:middle}

/* Spokes from hub to destinations */
.spoke{stroke:rgba(255,255,255,.1);stroke-width:1;fill:none;stroke-dasharray:2 4}

/* Animated flow particles moving along each spoke */
.flow-particle{fill:#5aa9ff;filter:drop-shadow(0 0 6px rgba(90,169,255,.9));opacity:0}
.flow-particle.p1{animation:flowMove 5s cubic-bezier(.4,.1,.4,1) infinite;animation-delay:0s}
.flow-particle.p2{animation:flowMove 5s cubic-bezier(.4,.1,.4,1) infinite;animation-delay:.5s}
.flow-particle.p3{animation:flowMove 5s cubic-bezier(.4,.1,.4,1) infinite;animation-delay:1s}
.flow-particle.p4{animation:flowMove 5s cubic-bezier(.4,.1,.4,1) infinite;animation-delay:1.5s}
.flow-particle.p5{animation:flowMove 5s cubic-bezier(.4,.1,.4,1) infinite;animation-delay:2s}
.flow-particle.p6{animation:flowMove 5s cubic-bezier(.4,.1,.4,1) infinite;animation-delay:2.5s}
.flow-particle.p7{animation:flowMove 5s cubic-bezier(.4,.1,.4,1) infinite;animation-delay:3s}
.flow-particle.p8{animation:flowMove 5s cubic-bezier(.4,.1,.4,1) infinite;animation-delay:3.5s}
.flow-particle.p9{animation:flowMove 5s cubic-bezier(.4,.1,.4,1) infinite;animation-delay:4s}
.flow-particle.p10{animation:flowMove 5s cubic-bezier(.4,.1,.4,1) infinite;animation-delay:4.5s}
@keyframes flowMove{
  0%{opacity:0;transform:translate(0,0)}
  8%{opacity:1}
  92%{opacity:1}
  100%{opacity:0;transform:translate(var(--tx),var(--ty))}
}

/* Destination nodes */
.dest-node{fill:#141414;stroke:rgba(90,169,255,.5);stroke-width:1.5}
.dest-node-glow{fill:#5aa9ff;filter:drop-shadow(0 0 8px rgba(90,169,255,.8))}
.dest-pulse{fill:none;stroke:rgba(90,169,255,.4);stroke-width:1.2}
.dest-pulse.n1{animation:destPulse 5s ease-out infinite;animation-delay:1s}
.dest-pulse.n2{animation:destPulse 5s ease-out infinite;animation-delay:1.5s}
.dest-pulse.n3{animation:destPulse 5s ease-out infinite;animation-delay:2s}
.dest-pulse.n4{animation:destPulse 5s ease-out infinite;animation-delay:2.5s}
.dest-pulse.n5{animation:destPulse 5s ease-out infinite;animation-delay:3s}
.dest-pulse.n6{animation:destPulse 5s ease-out infinite;animation-delay:3.5s}
.dest-pulse.n7{animation:destPulse 5s ease-out infinite;animation-delay:4s}
.dest-pulse.n8{animation:destPulse 5s ease-out infinite;animation-delay:4.5s}
.dest-pulse.n9{animation:destPulse 5s ease-out infinite;animation-delay:5s}
.dest-pulse.n10{animation:destPulse 5s ease-out infinite;animation-delay:5.5s}
@keyframes destPulse{0%{r:6;opacity:.9}100%{r:22;opacity:0}}

.dest-name{fill:rgba(255,255,255,.85);font-family:'Inter',sans-serif;font-size:11px;font-weight:600;letter-spacing:.5px}
@media (max-width:600px){.dest-name{font-size:14px}}
.dest-code{fill:rgba(255,255,255,.35);font-family:'SF Mono',Menlo,monospace;font-size:9px;font-weight:500;letter-spacing:.3px}

/* ---- Panel 2: Shield — national security ---- */
.shield-ring{fill:none;stroke:rgba(255,255,255,.1);stroke-width:1}
.shield-ring.strong{stroke:rgba(255,255,255,.22)}
.shield-arc{fill:none;stroke:#5aa9ff;stroke-width:1.8;stroke-linecap:round;filter:drop-shadow(0 0 4px rgba(90,169,255,.4));transform-origin:0 0}
.shield-arc.a1{animation:arcSweep 5s ease-in-out infinite}
.shield-arc.a2{animation:arcSweep 5s ease-in-out infinite;animation-delay:1.66s}
.shield-arc.a3{animation:arcSweep 5s ease-in-out infinite;animation-delay:3.33s}
@keyframes arcSweep{0%{stroke-dasharray:0 999;transform:rotate(0)}45%{stroke-dasharray:180 999}55%{stroke-dasharray:180 999}100%{stroke-dasharray:0 999;transform:rotate(360deg)}}
.shield-core{fill:#1a1a1a;stroke:rgba(255,255,255,.35);stroke-width:1.2}
.shield-check{fill:none;stroke:rgba(255,255,255,.9);stroke-width:2.5;stroke-linecap:round;stroke-linejoin:round;stroke-dasharray:60;stroke-dashoffset:60;animation:checkDraw 3s ease-out infinite}
@keyframes checkDraw{0%{stroke-dashoffset:60}30%{stroke-dashoffset:0}80%{stroke-dashoffset:0;opacity:1}100%{stroke-dashoffset:0;opacity:.6}}
.shield-scan-line{fill:none;stroke:rgba(90,169,255,.6);stroke-width:1;stroke-dasharray:2 4}
.shield-satellite{fill:rgba(255,255,255,.7);animation:satBlink 2.4s ease-in-out infinite}
.shield-satellite.s2{animation-delay:.8s}
.shield-satellite.s3{animation-delay:1.6s}
@keyframes satBlink{0%,100%{opacity:.3}50%{opacity:1}}

/* ---- Panel 3: CCL grid — technology leadership ---- */
.ccl-cell-bg{fill:rgba(255,255,255,.03);stroke:rgba(255,255,255,.12);stroke-width:.8}
.ccl-cell-num{fill:rgba(255,255,255,.5);font-family:'Inter',sans-serif;font-size:14px;font-weight:700;text-anchor:middle;dominant-baseline:middle;transition:fill .3s}
.ccl-cell-label{fill:rgba(255,255,255,.4);font-family:'Inter',sans-serif;font-size:8px;font-weight:500;letter-spacing:.6px;text-anchor:middle;text-transform:uppercase;transition:fill .3s}
.ccl-cell-active{fill:none;stroke:#5aa9ff;stroke-width:1.5;filter:drop-shadow(0 0 8px rgba(90,169,255,.6));opacity:0}
.ccl-cell-active.on{opacity:1;transition:opacity .35s}
.ccl-cell-num.on{fill:#fff}
.ccl-cell-label.on{fill:rgba(255,255,255,.85)}
.ccl-title{fill:#fff;font-family:'Inter',sans-serif;font-size:11px;font-weight:700;text-anchor:middle;letter-spacing:2.5px;text-transform:uppercase}
.ccl-sub{fill:rgba(255,255,255,.4);font-family:'Inter',sans-serif;font-size:9.5px;text-anchor:middle;letter-spacing:1.5px;text-transform:uppercase}
.btn{
  padding:15px 30px;font-size:14px;font-weight:600;letter-spacing:.2px;border-radius:8px;
  transition:all .18s;display:inline-flex;align-items:center;gap:8px;
}
.btn-primary{background:#fff;color:#000}
.btn-primary:hover{background:#e5e5e5;transform:translateY(-1px)}
.btn-secondary{background:rgba(255,255,255,.08);color:#fff;border:1px solid var(--line-strong)}
.btn-secondary:hover{background:rgba(255,255,255,.14);border-color:rgba(255,255,255,.28)}
.btn-large{padding:18px 34px;font-size:15px}
.btn-arrow{transition:transform .18s}
.btn:hover .btn-arrow{transform:translateX(3px)}

.hero-scroll{
  position:absolute;bottom:40px;left:50%;transform:translateX(-50%);
  font-size:11px;letter-spacing:3px;text-transform:uppercase;color:var(--text-dimmer);
  animation:bob 2.4s ease-in-out infinite;
}
@keyframes bob{0%,100%{transform:translate(-50%,0)}50%{transform:translate(-50%,-6px)}}

/* ============ FEATURE TILES ============ */
.tiles{padding:120px 40px;background:#000}
.tiles-inner{max-width:1400px;margin:0 auto}
.tiles-head{margin-bottom:60px;max-width:720px}
.tiles-eyebrow{font-size:11px;font-weight:600;letter-spacing:3px;text-transform:uppercase;color:var(--text-dimmer);margin-bottom:16px}
.tiles-title{font-size:clamp(36px,5vw,54px);font-weight:700;letter-spacing:-.02em;line-height:1.05;margin-bottom:18px}
.tiles-sub{font-size:17px;color:var(--text-dim);line-height:1.55;max-width:600px}
.tile-grid{
  display:grid;grid-template-columns:repeat(2,1fr);gap:20px;
}
.tile{
  background:linear-gradient(180deg,var(--bg-elev) 0%,#0d0d0d 100%);
  border:1px solid var(--line);border-radius:16px;
  padding:44px 40px;cursor:pointer;transition:all .22s;
  position:relative;overflow:hidden;min-height:360px;
  display:flex;flex-direction:column;justify-content:space-between;
}
.tile:hover{border-color:var(--line-strong);transform:translateY(-2px)}
.tile::before{
  content:'';position:absolute;top:0;left:0;right:0;height:2px;
  background:linear-gradient(90deg,transparent,rgba(255,255,255,.4),transparent);
  opacity:0;transition:opacity .22s;
}
.tile:hover::before{opacity:1}
.tile-num{
  font-size:11px;letter-spacing:3px;color:var(--text-dimmer);font-weight:600;margin-bottom:20px;
}
.tile-title{font-size:32px;font-weight:700;letter-spacing:-.02em;margin-bottom:12px;line-height:1.1}
.tile-desc{font-size:15px;color:var(--text-dim);line-height:1.55;max-width:440px}
.tile-cta{
  display:inline-flex;align-items:center;gap:8px;
  font-size:14px;font-weight:600;color:#fff;margin-top:28px;
}
.tile-cta-arrow{transition:transform .18s}
.tile:hover .tile-cta-arrow{transform:translateX(4px)}

/* ============ STATS STRIP ============ */
.stats{padding:100px 40px;background:#050505;border-top:1px solid var(--line);border-bottom:1px solid var(--line)}
.stats-inner{max-width:1400px;margin:0 auto}
.stats-head{margin-bottom:60px;max-width:720px}
.stats-eyebrow{font-size:11px;font-weight:600;letter-spacing:3px;text-transform:uppercase;color:var(--text-dimmer);margin-bottom:16px}
.stats-title{font-size:clamp(32px,4vw,44px);font-weight:700;letter-spacing:-.02em;line-height:1.1;margin-bottom:16px}
.stats-sub{font-size:16px;color:var(--text-dim);line-height:1.55;max-width:600px}
.stats-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:40px}
.stat-num{font-size:56px;font-weight:800;letter-spacing:-.03em;line-height:1;margin-bottom:8px;background:linear-gradient(180deg,#fff 0%,#909090 100%);-webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent}
.stat-num .arrow{display:inline-block;font-size:22px;font-weight:600;color:var(--sky);margin-right:6px;vertical-align:middle;transform:translateY(-4px)}
.stat-label{font-size:13px;color:var(--text-dim);letter-spacing:.2px}
.stat-from{font-size:11.5px;color:var(--text-dimmer);letter-spacing:.3px;margin-top:6px}

/* ============ SPECIAL NOTICE ============ */
.notice{padding:100px 40px;background:#000}
.notice-inner{max-width:1000px;margin:0 auto;text-align:center}
.notice-tag{display:inline-block;padding:6px 14px;font-size:11px;font-weight:600;letter-spacing:2px;text-transform:uppercase;color:var(--amber);background:rgba(227,167,47,.1);border:1px solid rgba(227,167,47,.25);border-radius:20px;margin-bottom:24px}
.notice-title{font-size:38px;font-weight:700;letter-spacing:-.02em;line-height:1.15;margin-bottom:20px}
.notice-body{font-size:17px;color:var(--text-dim);line-height:1.6;margin-bottom:32px;max-width:720px;margin-left:auto;margin-right:auto}

/* ============ FOOTER ============ */
.footer{background:#050505;border-top:1px solid var(--line);padding:60px 40px 32px}
.footer-inner{max-width:1400px;margin:0 auto}
.footer-cols{display:grid;grid-template-columns:2fr repeat(4,1fr);gap:48px;margin-bottom:48px}
.footer-brand{max-width:340px}
.footer-mark{font-weight:800;font-size:15px;margin-bottom:14px;display:flex;align-items:center;gap:10px}
.footer-tag{font-size:13px;color:var(--text-dim);line-height:1.55}
.footer-col-title{font-size:11px;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:var(--text-dimmer);margin-bottom:16px}
.footer-links{display:flex;flex-direction:column;gap:10px}
.footer-link{font-size:13px;color:var(--text-dim);cursor:pointer;transition:color .15s}
.footer-link:hover{color:var(--text)}
.footer-bottom{border-top:1px solid var(--line);padding-top:24px;display:flex;justify-content:space-between;font-size:12px;color:var(--text-dimmer);flex-wrap:wrap;gap:12px}
.footer-powered{font-size:11px;color:var(--text-dimmer);letter-spacing:.5px}
.footer-powered .brand{color:var(--text-dim);font-weight:600}

/* ============ SECTION PAGE ============ */
.section-page{padding:120px 40px 80px;background:#000;min-height:calc(100vh - var(--nav-h))}
.section-inner{max-width:1200px;margin:0 auto}
.section-hero{margin-bottom:80px;max-width:820px}
.section-crumb{font-size:11px;letter-spacing:3px;text-transform:uppercase;color:var(--text-dimmer);margin-bottom:20px;font-weight:600}
.section-crumb .sep{margin:0 10px;opacity:.5}
.section-h1{font-size:clamp(44px,5.5vw,68px);font-weight:800;letter-spacing:-.03em;line-height:1.05;margin-bottom:22px}
.section-lead{font-size:20px;color:var(--text-dim);line-height:1.55;max-width:720px}

.section-block{padding:60px 0;border-top:1px solid var(--line)}
.section-block-eyebrow{font-size:11px;letter-spacing:3px;text-transform:uppercase;color:var(--text-dimmer);font-weight:600;margin-bottom:14px}
.section-block-title{font-size:36px;font-weight:700;letter-spacing:-.02em;margin-bottom:18px;line-height:1.1}
.section-block-body{font-size:17px;color:var(--text-dim);line-height:1.65;max-width:760px}
.section-block-body p+p{margin-top:16px}
.section-block-body strong{color:var(--text);font-weight:600}

.step-row{display:grid;grid-template-columns:repeat(5,1fr);gap:16px;margin-top:44px}
.step-card{
  background:var(--bg-elev);border:1px solid var(--line);border-radius:12px;
  padding:24px;position:relative;transition:all .2s;
}
.step-card:hover{border-color:var(--line-strong)}
.step-num{font-size:11px;font-weight:600;color:var(--text-dimmer);letter-spacing:1.5px;margin-bottom:12px}
.step-title{font-size:16px;font-weight:600;letter-spacing:-.01em;margin-bottom:8px;line-height:1.25}
.step-desc{font-size:13px;color:var(--text-dim);line-height:1.5}

.detail-row{display:grid;grid-template-columns:1fr 1fr;gap:20px;margin-top:32px}
.detail-card{background:var(--bg-elev);border:1px solid var(--line);border-radius:12px;padding:32px}
.detail-card-title{font-size:20px;font-weight:600;margin-bottom:10px;letter-spacing:-.01em}
.detail-card-body{font-size:14.5px;color:var(--text-dim);line-height:1.6}
.detail-card-body ul{margin-top:12px;padding-left:18px}
.detail-card-body li{margin-bottom:8px}

.callout{background:linear-gradient(180deg,#0d0d0d,#050505);border:1px solid var(--line);border-radius:16px;padding:40px;margin-top:48px;display:flex;justify-content:space-between;align-items:center;gap:32px}
.callout-title{font-size:22px;font-weight:600;letter-spacing:-.01em;margin-bottom:6px}
.callout-body{font-size:14.5px;color:var(--text-dim)}

/* ============ SIGN IN ============ */
.signin-wrap{min-height:calc(100vh - var(--nav-h));display:flex;align-items:center;justify-content:center;padding:40px;background:radial-gradient(ellipse at center,rgba(90,169,255,.06) 0%,transparent 60%),#000}
.signin-card{background:var(--bg-elev);border:1px solid var(--line);border-radius:20px;padding:56px 48px;max-width:460px;width:100%;text-align:center}
.signin-title{font-size:32px;font-weight:700;letter-spacing:-.02em;margin-bottom:12px}
.signin-sub{font-size:15px;color:var(--text-dim);line-height:1.55;margin-bottom:36px}
.signin-form{display:flex;flex-direction:column;gap:14px;margin-bottom:24px;text-align:left}
.form-label{font-size:11px;font-weight:600;letter-spacing:1.5px;text-transform:uppercase;color:var(--text-dimmer);margin-bottom:6px;display:block}
.form-input{
  width:100%;background:#0a0a0a;border:1px solid var(--line-strong);
  padding:14px 16px;font-size:15px;border-radius:8px;color:var(--text);
  transition:border .15s;
}
.form-input:focus{outline:none;border-color:#fff}
.signin-note{font-size:12px;color:var(--text-dimmer);margin-top:20px;line-height:1.5}
.login-methods{display:flex;flex-direction:column;gap:10px;margin-top:24px}
.login-btn{
  padding:13px 20px;font-size:14px;font-weight:500;border-radius:8px;
  background:#0a0a0a;border:1px solid var(--line-strong);color:var(--text);
  display:flex;align-items:center;justify-content:center;gap:10px;transition:all .15s;
}
.login-btn:hover{border-color:rgba(255,255,255,.28);background:#141414}
.login-divider{display:flex;align-items:center;gap:12px;color:var(--text-dimmer);font-size:11px;letter-spacing:2px;text-transform:uppercase;margin:8px 0}
.login-divider::before,.login-divider::after{content:'';flex:1;height:1px;background:var(--line)}

/* ============ DASHBOARD ============ */
.dash{padding:60px 40px 80px;background:#000;min-height:calc(100vh - var(--nav-h))}
.dash-inner{max-width:1400px;margin:0 auto}
.dash-welcome{margin-bottom:44px;display:flex;justify-content:space-between;align-items:flex-end;flex-wrap:wrap;gap:16px}
.dash-hi{font-size:15px;color:var(--text-dim);margin-bottom:8px;font-weight:500}
.dash-hi .badge{display:inline-block;background:rgba(63,185,80,.14);color:var(--success);font-size:10px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;padding:3px 8px;border-radius:4px;margin-left:8px;vertical-align:middle}
.dash-h1{font-size:44px;font-weight:800;letter-spacing:-.025em;line-height:1.1;margin-bottom:10px}
.dash-lead{font-size:17px;color:var(--text-dim);max-width:640px;line-height:1.5}
.dash-meta{font-size:12px;color:var(--text-dimmer);letter-spacing:.3px}
.dash-meta .live{color:var(--success)}

.resume-hero{
  background:linear-gradient(135deg,#141414 0%,#0a0a0a 60%,#0d1926 100%);
  border:1px solid var(--line-strong);border-radius:20px;padding:44px;
  margin-bottom:32px;position:relative;overflow:hidden;
}
.resume-hero::before{content:'';position:absolute;top:-100px;right:-100px;width:400px;height:400px;background:radial-gradient(circle,rgba(90,169,255,.12) 0%,transparent 65%);pointer-events:none}
.resume-hero-inner{position:relative;display:flex;justify-content:space-between;align-items:center;gap:40px;flex-wrap:wrap}
.resume-label{display:inline-flex;align-items:center;gap:8px;font-size:11px;font-weight:600;letter-spacing:2px;text-transform:uppercase;color:var(--sky);margin-bottom:14px}
.resume-label .pulse{width:8px;height:8px;border-radius:50%;background:var(--sky);box-shadow:0 0 0 0 rgba(90,169,255,.7);animation:pulse 2s infinite}
@keyframes pulse{0%{box-shadow:0 0 0 0 rgba(90,169,255,.7)}70%{box-shadow:0 0 0 12px rgba(90,169,255,0)}100%{box-shadow:0 0 0 0 rgba(90,169,255,0)}}
.resume-title{font-size:28px;font-weight:700;letter-spacing:-.02em;margin-bottom:8px;line-height:1.15}
.resume-meta{font-size:14px;color:var(--text-dim);margin-bottom:14px}
.resume-meta strong{color:var(--text);font-weight:600}
.resume-progress{width:340px;height:6px;background:rgba(255,255,255,.06);border-radius:6px;overflow:hidden}
.resume-progress-fill{height:100%;background:linear-gradient(90deg,var(--sky),#7fbfff);border-radius:6px}
.resume-progress-text{font-size:12px;color:var(--text-dimmer);margin-top:8px}
.resume-actions{display:flex;gap:12px;align-items:center}

.dash-grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:20px;margin-bottom:32px}
.card{
  background:var(--bg-elev);border:1px solid var(--line);border-radius:14px;
  padding:26px;transition:all .2s;
}
.card:hover{border-color:var(--line-strong)}
.card-eyebrow{font-size:10px;font-weight:600;letter-spacing:2px;text-transform:uppercase;color:var(--text-dimmer);margin-bottom:12px}
.card-h{font-size:17px;font-weight:600;letter-spacing:-.01em;margin-bottom:8px;line-height:1.3}
.card-b{font-size:14px;color:var(--text-dim);line-height:1.55}

.app-list{background:var(--bg-elev);border:1px solid var(--line);border-radius:14px;overflow:hidden}
.app-list-head{padding:20px 26px;border-bottom:1px solid var(--line);display:flex;justify-content:space-between;align-items:center}
.app-list-title{font-size:15px;font-weight:600;letter-spacing:-.01em}
.app-list-sub{font-size:12px;color:var(--text-dimmer)}
.app-row{padding:18px 26px;border-bottom:1px solid var(--line);display:grid;grid-template-columns:120px 1fr 160px 100px 24px;align-items:center;gap:20px;cursor:pointer;transition:background .15s}
.app-row:last-child{border-bottom:none}
.app-row:hover{background:rgba(255,255,255,.02)}
.app-id{font-family:'SF Mono',Menlo,monospace;font-size:12px;color:var(--text-dim);font-weight:500}
.app-desc{font-size:14px;color:var(--text);font-weight:500}
.app-desc .sub{font-size:12px;color:var(--text-dimmer);font-weight:400;margin-top:2px;display:block}
.app-date{font-size:12px;color:var(--text-dim)}
.app-status{font-size:11px;font-weight:600;letter-spacing:.5px;padding:4px 10px;border-radius:12px;text-align:center;display:inline-block}
.status-approved{background:rgba(63,185,80,.14);color:var(--success)}
.status-review{background:rgba(90,169,255,.14);color:var(--sky)}
.status-progress{background:rgba(227,167,47,.14);color:var(--amber)}
.status-denied{background:rgba(200,16,46,.18);color:#ff5566}
.app-arrow{color:var(--text-dimmer);font-size:14px}

/* ============ APPLICATION FLOW ============ */
.app-flow{padding:60px 40px 120px;background:#000;min-height:calc(100vh - var(--nav-h))}
.app-flow-inner{max-width:960px;margin:0 auto}
.app-flow-head{margin-bottom:44px}
.app-flow-back{font-size:13px;color:var(--text-dim);cursor:pointer;margin-bottom:20px;display:inline-flex;align-items:center;gap:6px}
.app-flow-back:hover{color:var(--text)}
.app-flow-title{font-size:34px;font-weight:700;letter-spacing:-.02em;margin-bottom:8px;line-height:1.15}
.app-flow-sub{font-size:15px;color:var(--text-dim)}

.stepper{display:flex;gap:0;margin-bottom:44px;position:relative}
.stepper-item{flex:1;position:relative;display:flex;flex-direction:column;align-items:center;text-align:center;cursor:pointer;transition:opacity .15s}
.stepper-item.disabled{cursor:default;opacity:.6}
.stepper-dot{width:32px;height:32px;border-radius:50%;background:var(--bg-elev);border:1px solid var(--line-strong);display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:600;color:var(--text-dim);z-index:2;transition:all .2s;position:relative}
.stepper-item.done .stepper-dot{background:#fff;color:#000;border-color:#fff}
.stepper-item.active .stepper-dot{background:var(--sky);color:#fff;border-color:var(--sky);box-shadow:0 0 0 4px rgba(90,169,255,.2)}
.stepper-label{font-size:11.5px;color:var(--text-dim);margin-top:10px;font-weight:500;letter-spacing:.2px}
.stepper-item.active .stepper-label,.stepper-item.done .stepper-label{color:var(--text)}
.stepper-line{position:absolute;top:15px;left:50%;right:-50%;height:1px;background:var(--line-strong);z-index:1}
.stepper-item.done+.stepper-item .stepper-line{background:linear-gradient(90deg,#fff,var(--line-strong))}
.stepper-item:last-child .stepper-line{display:none}

.step-panel{
  background:var(--bg-elev);border:1px solid var(--line);border-radius:16px;
  padding:44px;
}
.step-panel-h{font-size:24px;font-weight:600;letter-spacing:-.02em;margin-bottom:8px}
.step-panel-sub{font-size:14px;color:var(--text-dim);margin-bottom:32px;line-height:1.55}
.form-grid{display:grid;grid-template-columns:1fr 1fr;gap:20px;margin-bottom:32px}
.form-grid.single{grid-template-columns:1fr}
.form-field{display:flex;flex-direction:column}
.form-field.span2{grid-column:span 2}
.form-field-label{font-size:11px;font-weight:600;letter-spacing:1.2px;text-transform:uppercase;color:var(--text-dimmer);margin-bottom:8px}
.form-field-input,.form-field-select,.form-field-textarea{
  background:#0a0a0a;border:1px solid var(--line-strong);border-radius:8px;
  padding:12px 14px;font-size:14px;color:var(--text);transition:border .15s;
}
.form-field-textarea{resize:vertical;min-height:100px;font-family:inherit}
.form-field-input:focus,.form-field-select:focus,.form-field-textarea:focus{outline:none;border-color:#fff}
.form-field-hint{font-size:12px;color:var(--text-dimmer);margin-top:6px;line-height:1.4}
.form-field-hint .aitag{background:rgba(90,169,255,.14);color:var(--sky);font-size:9px;font-weight:700;letter-spacing:1px;padding:2px 6px;border-radius:3px;margin-right:6px}

.prefill-banner{background:linear-gradient(90deg,rgba(90,169,255,.14),rgba(90,169,255,.04));border:1px solid rgba(90,169,255,.28);border-radius:10px;padding:14px 18px;font-size:13px;color:var(--sky);margin-bottom:28px;display:flex;align-items:center;gap:10px;line-height:1.4}
.prefill-banner .icon{font-size:16px}
.prefill-banner strong{color:#a8ceff;font-weight:600}

.eccn-helper{background:linear-gradient(180deg,rgba(90,169,255,.06),transparent);border:1px solid rgba(90,169,255,.2);border-radius:10px;padding:20px;margin-bottom:20px}
.eccn-helper-head{display:flex;align-items:center;gap:8px;font-size:12px;font-weight:600;color:var(--sky);letter-spacing:.3px;margin-bottom:12px;text-transform:uppercase;font-size:11px;letter-spacing:2px}
.eccn-suggestion{background:#0a0a0a;border:1px solid var(--line);border-radius:8px;padding:14px;margin-top:8px;display:flex;justify-content:space-between;align-items:center;gap:16px}
.eccn-code{font-family:'SF Mono',Menlo,monospace;font-size:14px;font-weight:600;color:#fff}
.eccn-desc{font-size:12.5px;color:var(--text-dim);margin-top:2px;line-height:1.4}
.eccn-use{padding:6px 12px;font-size:11px;font-weight:600;background:#fff;color:#000;border-radius:6px;letter-spacing:.3px}

.step-actions{display:flex;justify-content:space-between;align-items:center;padding-top:24px;border-top:1px solid var(--line);margin-top:12px}
.save-indicator{font-size:12px;color:var(--text-dimmer);display:flex;align-items:center;gap:6px}
.save-dot{width:6px;height:6px;border-radius:50%;background:var(--success)}

.review-section{margin-bottom:28px}
.review-h{font-size:11px;font-weight:600;letter-spacing:2px;text-transform:uppercase;color:var(--text-dimmer);margin-bottom:14px;padding-bottom:10px;border-bottom:1px solid var(--line)}
.review-row{display:grid;grid-template-columns:180px 1fr;gap:20px;padding:10px 0;font-size:13.5px}
.review-key{color:var(--text-dim)}
.review-val{color:var(--text);font-weight:500}

.confirm{text-align:center;padding:60px 0}
.confirm-check{width:80px;height:80px;border-radius:50%;background:linear-gradient(135deg,var(--success),#2ea043);display:flex;align-items:center;justify-content:center;font-size:36px;color:#fff;margin:0 auto 28px;box-shadow:0 0 0 8px rgba(63,185,80,.14)}
.confirm-h{font-size:32px;font-weight:700;letter-spacing:-.02em;margin-bottom:12px}
.confirm-sub{font-size:15px;color:var(--text-dim);line-height:1.55;max-width:520px;margin:0 auto 32px}
.confirm-id{font-family:'SF Mono',Menlo,monospace;background:var(--bg-elev);border:1px solid var(--line);padding:14px 20px;border-radius:10px;display:inline-block;font-size:14px;letter-spacing:.5px;margin-bottom:28px}
.confirm-id strong{color:var(--sky);font-weight:600;margin-left:8px}
.confirm-next{display:flex;gap:12px;justify-content:center;flex-wrap:wrap}

/* ============ STATUS DETAIL ============ */
.status-page{padding:60px 40px 120px;min-height:calc(100vh - var(--nav-h));background:#000}
.status-inner{max-width:1200px;margin:0 auto;display:grid;grid-template-columns:1fr 340px;gap:32px}
.status-main{background:var(--bg-elev);border:1px solid var(--line);border-radius:16px;padding:44px}
.status-crumb{font-size:12px;color:var(--text-dim);cursor:pointer;margin-bottom:16px;display:inline-flex;align-items:center;gap:6px}
.status-crumb:hover{color:var(--text)}
.status-h{font-size:32px;font-weight:700;letter-spacing:-.02em;margin-bottom:8px;line-height:1.15}
.status-id-line{font-family:'SF Mono',Menlo,monospace;font-size:13px;color:var(--text-dimmer);margin-bottom:24px}
.timeline{margin-top:36px;position:relative;padding-left:32px}
.timeline::before{content:'';position:absolute;left:9px;top:8px;bottom:8px;width:2px;background:var(--line-strong)}
.timeline-item{position:relative;margin-bottom:32px}
.timeline-item:last-child{margin-bottom:0}
.timeline-dot{position:absolute;left:-32px;top:2px;width:20px;height:20px;border-radius:50%;background:var(--bg-elev);border:2px solid var(--line-strong)}
.timeline-item.done .timeline-dot{background:var(--success);border-color:var(--success)}
.timeline-item.active .timeline-dot{background:var(--sky);border-color:var(--sky);box-shadow:0 0 0 4px rgba(90,169,255,.2)}
.timeline-title{font-size:15px;font-weight:600;margin-bottom:4px}
.timeline-when{font-size:12px;color:var(--text-dimmer);margin-bottom:8px}
.timeline-body{font-size:13.5px;color:var(--text-dim);line-height:1.55}

.status-side{display:flex;flex-direction:column;gap:16px}
.status-info-card{background:var(--bg-elev);border:1px solid var(--line);border-radius:14px;padding:24px}
.status-info-title{font-size:11px;font-weight:600;letter-spacing:2px;text-transform:uppercase;color:var(--text-dimmer);margin-bottom:16px}
.status-info-row{display:flex;justify-content:space-between;padding:8px 0;font-size:13px;border-bottom:1px solid var(--line)}
.status-info-row:last-child{border-bottom:none}
.status-info-key{color:var(--text-dim)}
.status-info-val{color:var(--text);font-weight:500;text-align:right}

/* ============ ABOUT ============ */
.about-hero{
  min-height:calc(100vh - var(--nav-h));
  display:flex;align-items:center;padding:80px 40px;position:relative;overflow:hidden;
  background:radial-gradient(ellipse at 70% 30%,rgba(200,16,46,.08) 0%,transparent 55%),#000;
}
.about-hero-inner{max-width:1200px;margin:0 auto;width:100%}
.about-eyebrow{font-size:11px;letter-spacing:4px;text-transform:uppercase;color:var(--text-dimmer);font-weight:600;margin-bottom:24px}
.about-h1{font-size:clamp(48px,7vw,88px);font-weight:800;letter-spacing:-.03em;line-height:1.02;max-width:960px;margin-bottom:32px}
.about-lead{font-size:20px;color:var(--text-dim);line-height:1.55;max-width:720px}
.about-principles{padding:100px 40px;background:#050505;border-top:1px solid var(--line)}
.about-principles-inner{max-width:1200px;margin:0 auto}
.principle-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:20px;margin-top:60px}
@media (min-width:1400px){.principle-grid{grid-template-columns:repeat(3,1fr)}}
.principle-card{background:var(--bg-elev);border:1px solid var(--line);border-radius:14px;padding:32px}
.principle-num{font-size:11px;letter-spacing:2px;color:var(--text-dimmer);font-weight:600;margin-bottom:14px}
.principle-h{font-size:22px;font-weight:600;letter-spacing:-.01em;margin-bottom:10px;line-height:1.2}
.principle-b{font-size:14.5px;color:var(--text-dim);line-height:1.6}

/* ============ AGENT DRAWER ============ */
.agent-fab{
  position:fixed;bottom:28px;right:28px;
  width:60px;height:60px;border-radius:50%;
  background:linear-gradient(135deg,#fff 0%,#c8c8c8 100%);
  color:#000;font-size:24px;font-weight:600;
  display:flex;align-items:center;justify-content:center;
  box-shadow:0 8px 32px rgba(0,0,0,.4),0 0 0 1px rgba(255,255,255,.1);
  cursor:pointer;z-index:200;transition:all .2s;
}
.agent-fab:hover{transform:scale(1.06);box-shadow:0 12px 40px rgba(0,0,0,.5),0 0 0 1px rgba(255,255,255,.2)}
.agent-fab-pulse{position:absolute;inset:0;border-radius:50%;border:2px solid rgba(255,255,255,.4);animation:fabPulse 2.4s infinite}
@keyframes fabPulse{0%{transform:scale(1);opacity:1}100%{transform:scale(1.6);opacity:0}}

.agent-drawer{
  position:fixed;bottom:100px;right:28px;
  width:400px;height:600px;max-height:calc(100vh - 140px);
  background:#0a0a0a;border:1px solid var(--line-strong);border-radius:20px;
  z-index:200;display:flex;flex-direction:column;overflow:hidden;
  box-shadow:0 24px 64px rgba(0,0,0,.6);
  transform:translateY(20px);opacity:0;pointer-events:none;
  transition:all .25s;
}
.agent-drawer.open{transform:translateY(0);opacity:1;pointer-events:auto}
.agent-head{padding:20px 22px;border-bottom:1px solid var(--line);display:flex;align-items:center;gap:12px}
.agent-avatar{width:36px;height:36px;border-radius:50%;background:linear-gradient(135deg,#fff,#a8a8a8);display:flex;align-items:center;justify-content:center;font-weight:700;color:#000;font-size:14px}
.agent-name{font-size:14px;font-weight:600}
.agent-status{font-size:11px;color:var(--success);display:flex;align-items:center;gap:5px;margin-top:2px}

function agentReply(query){
  const q = query.toLowerCase().trim();
  // exact-ish substring match
  for(const k of KNOWLEDGE){
    if(q.includes(k.q)) return k.a;
  }
  // keyword match
  const keywords = {
    'eccn':'what is an eccn','classification':'how do i classify my item','classify':'how do i classify my item',
    'license':'do i need a license','ear99':'what is ear99',
    'ccl':'commerce control list','commerce control':'commerce control list',

    'elc-2026-4471':'status of elc-2026-4471','4471':'status of elc-2026-4471','in progress':'status of elc-2026-4471',
    'elc-2025-9903':'status of elc-2025-9903','9903':'status of elc-2025-9903',
    'japan':"For Japan, most items ship under license exceptions or NLR (No License Required). Your composite pressure vessels ECCN 1C010.e are controlled for NS (National Security) and MT (Missile Technology) reasons — that requires a license to Japan. Given Mitsubishi Heavy Industries' status as a longstanding Japanese aerospace prime with clean end-user history, applications like yours typically approve within 32 days.",

  };
  for(const [kw,key] of Object.entries(keywords)){
    if(q.includes(kw)){
      const found = KNOWLEDGE.find(k=>k.q===key);
      if(found) return found.a;
    }
  }
  return "I don't have a direct answer for that yet, but I can route you to a BIS analyst or find related guidance in the EAR. Want me to open a case with an OEXS specialist?";
}

function CCLViz(){
  // Commerce Control List — 5x2 grid of the 10 CCL categories with a chase-highlight
  const cats = [
    {n:'0', label:'Nuclear'},
    {n:'1', label:'Materials'},
    {n:'2', label:'Chemicals'},
    {n:'3', label:'Electronics'},
    {n:'4', label:'Computers'},
    {n:'5', label:'Telecom'},
    {n:'6', label:'Sensors'},
    {n:'7', label:'Navigation'},
    {n:'8', label:'Marine'},
    {n:'9', label:'Aerospace'}
  ];
  const [active,setActive] = useState(0);
  useEffect(()=>{
    const t = setInterval(()=>setActive(a=>(a+1)%cats.length),550);
    return ()=>clearInterval(t);
  },[cats.length]);

  const cellW = 74, cellH = 74, gap = 10;
  const cols = 5, rows = 2;
  const gridW = cols*cellW + (cols-1)*gap;
  const gridH = rows*cellH + (rows-1)*gap;
  const startX = -gridW/2;
  const startY = -gridH/2;

  return e('svg',{className:'hero-viz',viewBox:'-260 -260 520 520',preserveAspectRatio:'xMidYMid meet','aria-hidden':true},
    // header
    e('text',{x:0,y:-120,className:'ccl-title'},'Commerce Control List'),
    e('text',{x:0,y:-100,className:'ccl-sub'},'10 categories · every controlled item'),

    // grid cells
    cats.map((c,i)=>{
      const col = i % cols;
      const row = Math.floor(i / cols);
      const x = startX + col*(cellW+gap);
      const y = startY + row*(cellH+gap);
      const isActive = i===active;
      return e('g',{key:i},
        e('rect',{x,y,width:cellW,height:cellH,rx:8,ry:8,className:'ccl-cell-bg'}),

function HeroViz(){
  // Hub-and-spoke: U.S. licensing hub at center, real BIS top destinations radiating outward.
  const isPhone = typeof window !== 'undefined' && window.innerWidth <= 600;
  const SPOKE_LEN = isPhone ? 150 : 200;
  const shortNames = {'United Kingdom':'UK','South Korea':'Korea','Netherlands':'Netherlands'};
  // 10 real BIS top export destinations, evenly spaced around the hub (36° apart)
  const destinations = [
    {name:'Japan',          angle:   0},
    {name:'South Korea',    angle: -36},
    {name:'Germany',        angle: -72},
    {name:'Netherlands',    angle:-108},
    {name:'United Kingdom', angle:-144},
    {name:'Canada',         angle: 180},
    {name:'Mexico',         angle: 144},
    {name:'Brazil',         angle: 108},
    {name:'Australia',      angle:  72},
    {name:'Singapore',      angle:  36}
  ].map(d=>{
    const displayName = isPhone && shortNames[d.name] ? shortNames[d.name] : d.name;
    const rad = d.angle * Math.PI / 180;
    const x = Math.cos(rad) * SPOKE_LEN;
    const y = Math.sin(rad) * SPOKE_LEN;
    let anchor,labelDx;
    const gutter = isPhone ? 12 : 16;
    if(x > 20){ anchor='start'; labelDx = gutter; }
    else if(x < -20){ anchor='end'; labelDx = -gutter; }
    else { anchor='middle'; labelDx = 0; }
    const labelDy = y < -30 ? -12 : y > 30 ? 20 : 4;
    return {...d, displayName, x, y, anchor, labelDx, labelDy};
  });

  return e('svg',{className:'hero-viz',viewBox:'-260 -260 520 520',preserveAspectRatio:'xMidYMid meet','aria-hidden':true},
    e('defs',null,
      e('radialGradient',{id:'hubGlow',cx:'50%',cy:'50%',r:'50%'},
        e('stop',{offset:'0%',stopColor:'#ffffff',stopOpacity:'0.09'}),
        e('stop',{offset:'70%',stopColor:'#ffffff',stopOpacity:'0.02'}),
        e('stop',{offset:'100%',stopColor:'#ffffff',stopOpacity:'0'})
      )
    ),

    // Ambient glow behind hub
    e('circle',{cx:0,cy:0,r:120,fill:'url(#hubGlow)'}),

    // Concentric context rings
    e('circle',{cx:0,cy:0,r:80,className:'flow-ring'}),
    e('circle',{cx:0,cy:0,r:130,className:'flow-ring dashed'}),
    e('circle',{cx:0,cy:0,r:180,className:'flow-ring'}),
    e('circle',{cx:0,cy:0,r:230,className:'flow-ring dashed'}),

    // Hub pulse waves
    e('circle',{cx:0,cy:0,r:22,className:'hub-pulse'}),
    e('circle',{cx:0,cy:0,r:22,className:'hub-pulse d1'}),
    e('circle',{cx:0,cy:0,r:22,className:'hub-pulse d2'}),

    // Spokes (dashed guide lines from hub to each destination)
    destinations.map((d,i)=>e('line',{
      key:'s'+i,x1:0,y1:0,x2:d.x,y2:d.y,className:'spoke'
    })),

    // Flow particles moving outward along each spoke
    destinations.map((d,i)=>e('circle',{
      key:'fp'+i,
      cx:0,cy:0,r:3,
      className:'flow-particle p'+(i+1),
      style:{'--tx':d.x+'px','--ty':d.y+'px'}
    })),

    // Central hub
    e('circle',{cx:0,cy:0,r:24,className:'hub-core'}),
    e('circle',{cx:0,cy:0,r:11,className:'hub-inner'}),
    e('text',{x:0,y:2,className:'hub-label'},'BIS'),
    e('text',{x:0,y:44,className:'hub-sublabel'},'Licensing Hub'),

    // Destination nodes (glowing + expanding pulse ring)
    destinations.map((d,i)=>[
      e('circle',{key:'dp'+i,cx:d.x,cy:d.y,r:6,className:'dest-pulse n'+(i+1)}),
      e('circle',{key:'dn'+i,cx:d.x,cy:d.y,r:6,className:'dest-node'}),
      e('circle',{key:'dg'+i,cx:d.x,cy:d.y,r:3,className:'dest-node-glow'})
    ]),

    // Destination labels
    destinations.map((d,i)=>e('text',{
      key:'l'+i,
      x:d.x+d.labelDx, y:d.y+d.labelDy,
      style:{textAnchor:d.anchor},
      className:'dest-name'
    },d.displayName))
  );
}

function useIsPhone(){
  const [phone,setPhone] = useState(typeof window!=='undefined' && window.innerWidth <= 600);
  useEffect(()=>{
    const onResize = ()=>setPhone(window.innerWidth <= 600);
    window.addEventListener('resize',onResize);
    return ()=>window.removeEventListener('resize',onResize);
  },[]);
  return phone;
}

function HeroTurnstile(){
  useIsPhone(); // subscribe so children re-render on breakpoint change
  const panels = useMemo(()=>[
    {
      eyebrow:'Enabling exporters',
      title:'Every export decision, one hub, the world.',

      title:'Ten categories. Every controlled item. Governed.',

  return e('div',{className:'hero-turnstile'},

      }))
    )
  );
}

/* ============================================================
   APPLICATION FLOW — end-to-end license application
   ============================================================ */
function ApplicationFlow({setRoute,activeApp,setActiveApp}){
  const isResume = activeApp==='inprogress';
  const initialStep = isResume ? 3 : 0;
  const [step,setStep] = useState(initialStep);
  const [form,setForm] = useState(isResume ? {
    ...IN_PROGRESS_APP.formData,
    exporterName: EXPORTER.company,
    exporterAddress: EXPORTER.address,
    exporterCage: EXPORTER.cage,
    exporterDuns: EXPORTER.duns,
    contactName: EXPORTER.name,
    contactPhone: EXPORTER.phone,
    contactEmail: EXPORTER.email
  } : {
    exporterName: EXPORTER.company,
    exporterAddress: EXPORTER.address,
    exporterCage: EXPORTER.cage,
    exporterDuns: EXPORTER.duns,
    contactName: EXPORTER.name,
    contactPhone: EXPORTER.phone,
    contactEmail: EXPORTER.email,
    productDescription:'',
    eccn:'',
    quantity:'',
    unitValue:'',
    totalValue:'',
    destination:'',
    endUserName:'',
    endUserAddress:'',
    endUse:''
  });
  const [submitted,setSubmitted] = useState(false);
  const [newAppId] = useState('ELC-2026-'+Math.floor(4500+Math.random()*400));

  const update = (k,v)=>setForm(f=>({...f,[k]:v}));

  const steps = [
    {label:'Exporter'},
    {label:'Product'},
    {label:'Destination'},
    {label:'End use'},
    {label:'Review'}
  ];

  if(submitted){
    return e('div',{className:'app-flow'},
      e('div',{className:'app-flow-inner'},
        e('div',{className:'step-panel'},
          e('div',{className:'confirm'},
            e('div',{className:'confirm-check'},'✓'),
            e('div',{className:'confirm-h'},'Application submitted.'),
            e('div',{className:'confirm-sub'},"We've received your export license application and forwarded it into interagency review. You'll receive updates here and at "+EXPORTER.email+" as it progresses."),
            e('div',{className:'confirm-id'},'Application ID',e('strong',null,isResume?IN_PROGRESS_APP.id:newAppId)),
            e('div',{className:'confirm-next'},
              e('button',{className:'btn btn-primary',onClick:()=>{setActiveApp(isResume?'4471':newAppId.split('-').pop());setRoute('status')}},'Track this application'),
              e('button',{className:'btn btn-secondary',onClick:()=>setRoute('dashboard')},'Back to dashboard')
            )
          )
        )
      )
    );
  }

  return e('div',{className:'app-flow'},
    e('div',{className:'app-flow-inner'},
      e('div',{className:'app-flow-head'},
        e('div',{className:'app-flow-back',onClick:()=>setRoute('dashboard')},'← Back to dashboard'),
        e('div',{className:'app-flow-title'},isResume?'Continue application '+IN_PROGRESS_APP.id:'New export license application'),
        e('div',{className:'app-flow-sub'},isResume?'Picking up where you left off yesterday at 4:42 PM.':'Filing a BIS-748P Export License Application.')
      ),

      e('div',{className:'stepper'},
        steps.map((s,i)=>e('div',{
          key:i,
          className:'stepper-item '+(i<step?'done':i===step?'active':'disabled'),
          onClick:()=>{if(i<=step)setStep(i)}
        },
          e('div',{className:'stepper-dot'},i<step?'✓':(i+1)),
          e('div',{className:'stepper-label'},s.label),
          e('div',{className:'stepper-line'})
        ))
      ),

      e('div',{className:'step-panel'},
        // ---- STEP 0: EXPORTER ----
        step===0 && e(React.Fragment,null,
          e('div',{className:'step-panel-h'},'Exporter information'),
          e('div',{className:'step-panel-sub'},'Confirm the entity filing this application. We\'ve pre-filled from your account.'),
          e('div',{className:'prefill-banner'},
            e('span',{className:'icon'},'✦'),
            e('div',null,e('strong',null,'Pre-filled from your account. '),'CAGE, DUNS, and contact details pulled from your Meridian Aerospace registration — updated ',EXPORTER.memberSince,'.')
          ),
          e('div',{className:'form-grid'},
            e('div',{className:'form-field span2'},
              e('div',{className:'form-field-label'},'Legal entity name'),
              e('input',{className:'form-field-input',value:form.exporterName,onChange:ev=>update('exporterName',ev.target.value)})
            ),
            e('div',{className:'form-field span2'},
              e('div',{className:'form-field-label'},'Principal address'),
              e('input',{className:'form-field-input',value:form.exporterAddress,onChange:ev=>update('exporterAddress',ev.target.value)})
            ),
            e('div',{className:'form-field'},
              e('div',{className:'form-field-label'},'CAGE code'),
              e('input',{className:'form-field-input',value:form.exporterCage,onChange:ev=>update('exporterCage',ev.target.value)})
            ),
            e('div',{className:'form-field'},
              e('div',{className:'form-field-label'},'DUNS'),
              e('input',{className:'form-field-input',value:form.exporterDuns,onChange:ev=>update('exporterDuns',ev.target.value)})
            ),
            e('div',{className:'form-field'},
              e('div',{className:'form-field-label'},'Primary contact'),
              e('input',{className:'form-field-input',value:form.contactName,onChange:ev=>update('contactName',ev.target.value)})
            ),
            e('div',{className:'form-field'},
              e('div',{className:'form-field-label'},'Contact phone'),
              e('input',{className:'form-field-input',value:form.contactPhone,onChange:ev=>update('contactPhone',ev.target.value)})
            )
          )
        ),

        // ---- STEP 1: PRODUCT ----
        step===1 && e(React.Fragment,null,
          e('div',{className:'step-panel-h'},'Product & classification'),
          e('div',{className:'step-panel-sub'},'Describe what you\'re exporting. Our AI classification assistant will suggest ECCNs.'),
          e('div',{className:'form-grid single'},
            e('div',{className:'form-field'},
              e('div',{className:'form-field-label'},'Product description'),
              e('textarea',{className:'form-field-textarea',value:form.productDescription,onChange:ev=>update('productDescription',ev.target.value),placeholder:'Describe the item in enough technical detail to classify it. Include materials, performance parameters, and intended function.'}),
              e('div',{className:'form-field-hint'},
                e('span',{className:'aitag'},'AI'),'CLASSIFI will scan your description as you type and suggest ECCNs.')
            )
          ),
          form.productDescription && form.productDescription.length > 30 && e('div',{className:'eccn-helper'},
            e('div',{className:'eccn-helper-head'},'✦ CLASSIFI · Suggested classifications'),
            e('div',{style:{fontSize:13,color:'var(--text-dim)',lineHeight:1.5,marginBottom:12}},
              "Based on your description and prior filings, three ECCNs are likely candidates:"),
            e('div',{className:'eccn-suggestion'},
              e('div',null,
                e('div',{className:'eccn-code'},'1C010.e'),
                e('div',{className:'eccn-desc'},'Composite materials with fiber tensile strength ≥3.18 × 10⁹ Pa. Reasons for control: NS, MT.')
              ),
              e('button',{className:'eccn-use',onClick:()=>update('eccn','1C010.e')},'Use this →')
            ),
            e('div',{className:'eccn-suggestion'},
              e('div',null,
                e('div',{className:'eccn-code'},'9A004'),
                e('div',{className:'eccn-desc'},'Space launch vehicles or spacecraft. Reasons for control: NS, MT, AT.')
              ),
              e('button',{className:'eccn-use',onClick:()=>update('eccn','9A004')},'Use this →')
            ),
            e('div',{className:'eccn-suggestion'},
              e('div',null,
                e('div',{className:'eccn-code'},'EAR99'),
                e('div',{className:'eccn-desc'},'Not specifically listed on the CCL. Unlikely for aerospace-grade composites but possible for commercial-grade variants.')
              ),
              e('button',{className:'eccn-use',onClick:()=>update('eccn','EAR99')},'Use this →')
            )
          ),
          e('div',{className:'form-grid'},
            e('div',{className:'form-field'},
              e('div',{className:'form-field-label'},'ECCN'),
              e('input',{className:'form-field-input',value:form.eccn,onChange:ev=>update('eccn',ev.target.value),placeholder:'e.g., 1C010.e'})
            ),
            e('div',{className:'form-field'},
              e('div',{className:'form-field-label'},'Quantity'),
              e('input',{className:'form-field-input',value:form.quantity,onChange:ev=>update('quantity',ev.target.value)})
            ),
            e('div',{className:'form-field'},
              e('div',{className:'form-field-label'},'Unit value (USD)'),
              e('input',{className:'form-field-input',value:form.unitValue,onChange:ev=>update('unitValue',ev.target.value)})
            ),
            e('div',{className:'form-field'},
              e('div',{className:'form-field-label'},'Total value (USD)'),
              e('input',{className:'form-field-input',value:form.totalValue,onChange:ev=>update('totalValue',ev.target.value)})
            )
          )
        ),

        // ---- STEP 2: DESTINATION ----
        step===2 && e(React.Fragment,null,
          e('div',{className:'step-panel-h'},'Destination & end user'),
          e('div',{className:'step-panel-sub'},'Where the item is going and who will receive it. We screen the recipient against every U.S. sanctions and denial list in real time.'),
          e('div',{className:'form-grid single'},
            e('div',{className:'form-field'},
              e('div',{className:'form-field-label'},'Destination country'),
              e('input',{className:'form-field-input',value:form.destination,onChange:ev=>update('destination',ev.target.value),placeholder:'e.g., Japan'}),
              form.destination && e('div',{className:'form-field-hint'},
                e('span',{className:'aitag'},'AI'),
                'Japan is Country Group A:5. ECCN ',form.eccn||'—',' controlled for NS and MT reasons requires a license for this destination. Median decision time to Japan for similar items: 32 days.')
            ),
            e('div',{className:'form-field'},
              e('div',{className:'form-field-label'},'End user name'),
              e('input',{className:'form-field-input',value:form.endUserName,onChange:ev=>update('endUserName',ev.target.value)}),
              form.endUserName && e('div',{className:'form-field-hint'},
                e('span',{className:'aitag'},'SCREEN'),
                'Screened against Entity List, Denied Persons List, Unverified List, MEU List, and Consolidated Screening List. ',e('strong',{style:{color:'var(--success)'}},'✓ No matches. '),'Corporate hierarchy checked — no listed subsidiaries.')
            ),
            e('div',{className:'form-field'},
              e('div',{className:'form-field-label'},'End user address'),
              e('textarea',{className:'form-field-textarea',style:{minHeight:80},value:form.endUserAddress,onChange:ev=>update('endUserAddress',ev.target.value)})
            )
          )
        ),

        // ---- STEP 3: END USE ----
        step===3 && e(React.Fragment,null,
          e('div',{className:'step-panel-h'},'End use'),
          e('div',{className:'step-panel-sub'},'How will the recipient use this item? Be specific — this drives license conditions.'),
          e('div',{className:'form-grid single'},
            e('div',{className:'form-field'},
              e('div',{className:'form-field-label'},'Intended end use'),
              e('textarea',{className:'form-field-textarea',style:{minHeight:140},value:form.endUse,onChange:ev=>update('endUse',ev.target.value),placeholder:'e.g., Integration into commercial satellite launch vehicles for civil space applications. Not for use in military systems or missile programs.'}),
              e('div',{className:'form-field-hint'},
                e('span',{className:'aitag'},'AI'),
                "Tip: Describe both what the item will be used for and what it won't. Explicit exclusions of military and missile end uses can strengthen a civil-space application.")
            )
          )
        ),

        // ---- STEP 4: REVIEW ----
        step===4 && e(React.Fragment,null,
          e('div',{className:'step-panel-h'},'Review and submit'),
          e('div',{className:'step-panel-sub'},'Everything you\'re about to submit. Edit any section before filing.'),
          e('div',{className:'review-section'},
            e('div',{className:'review-h'},'Exporter'),
            e('div',{className:'review-row'},e('div',{className:'review-key'},'Legal entity'),e('div',{className:'review-val'},form.exporterName)),
            e('div',{className:'review-row'},e('div',{className:'review-key'},'Address'),e('div',{className:'review-val'},form.exporterAddress)),
            e('div',{className:'review-row'},e('div',{className:'review-key'},'CAGE / DUNS'),e('div',{className:'review-val'},form.exporterCage+' / '+form.exporterDuns)),
            e('div',{className:'review-row'},e('div',{className:'review-key'},'Contact'),e('div',{className:'review-val'},form.contactName+' · '+form.contactPhone))
          ),
          e('div',{className:'review-section'},
            e('div',{className:'review-h'},'Product'),
            e('div',{className:'review-row'},e('div',{className:'review-key'},'Description'),e('div',{className:'review-val'},form.productDescription||'—')),

function StatusPage({setRoute,activeApp}){
  // find the app — 4471 = in-progress just submitted, otherwise past apps
  const isInProgress = activeApp==='4471' || activeApp==='inprogress';
  const app = isInProgress ? {
    id: IN_PROGRESS_APP.id,
    product: IN_PROGRESS_APP.product,
    destination: IN_PROGRESS_APP.destination,
    endUser: IN_PROGRESS_APP.endUser,
    filed: 'Today, 2:14 PM',
    status: 'Received',
    statusKey: 'review',
    eccn: '1C010.e',
    value: '$3,540,000',
    quantity: '24 units'
  } : (PAST_APPLICATIONS.find(a=>a.id.endsWith(activeApp)) || PAST_APPLICATIONS[0]);

  const timeline = isInProgress ? [
    {status:'done',title:'Application received',when:'Today, 2:14 PM',body:"Your application entered the BIS licensing queue. You'll be notified within one business day when it's assigned to a licensing officer."},
    {status:'active',title:'Awaiting officer assignment',when:'In queue',body:'A BIS licensing officer will be assigned within one business day. Median wait: 6 hours.'},
    {status:'',title:'Initial technical review',when:'Est. 3-5 days',body:'The assigned officer reviews the classification, transaction details, and screening results.'},
    {status:'',title:'Interagency review',when:'Est. 10-15 days if referred',body:'Some applications are referred to State, Defense, or Energy. Yours may or may not require this step.'},
    {status:'',title:'Decision',when:'Est. 25-35 days total',body:'License granted, granted with conditions, returned without action, or denied. You will receive the full determination and any conditions.'}
  ] : app.statusKey==='review' ? [
    {status:'done',title:'Application received',when:app.filed,body:'Application entered the BIS licensing queue.'},
    {status:'done',title:'Assigned to Officer Rachel Kim',when:'2 days later',body:'BIS Licensing Officer Rachel Kim was assigned as your case owner.'},
    {status:'done',title:'Referred for interagency review',when:'Day 12',body:'Case referred to State (DDTC), Defense (DTSA), and Energy for interagency review. This is standard for Category 7 items to Southeast Asia.'},
    {status:'active',title:'Awaiting interagency response',when:'Day 47 · currently',body:'DOD returned recommendations Day 34. State review in progress. Median time at this stage for similar cases: 62 days.'},
    {status:'',title:'Officer determination',when:'Est. Day 55-65',body:'Officer Kim will issue determination once all agency inputs return.'}
  ] : app.statusKey==='approved' ? [
    {status:'done',title:'Application received',when:app.filed,body:'Entered licensing queue.'},
    {status:'done',title:'Officer review',when:'Days 2-8',body:'Reviewed by licensing officer. No interagency referral required.'},
    {status:'done',title:'License granted',when:app.approved,body:'License granted with standard conditions. Valid for 24 months from date of issue.'}
  ] : [
    {status:'done',title:'Application received',when:app.filed,body:'Entered licensing queue.'},
    {status:'done',title:'Interagency review',when:'Days 14-36',body:'Referred for full interagency review.'},
    {status:'done',title:'License denied',when:app.denied,body:'Application denied on policy grounds. See attached determination memo for full rationale and appeal rights.'}
  ];

  return e(React.Fragment,null,
    e('div',{className:'status-page'},
      e('div',{className:'status-inner'},
        e('div',{className:'status-main'},
          e('div',{className:'status-crumb',onClick:()=>setRoute('dashboard')},'← Dashboard'),
          e('div',{className:'status-h'},app.product),
          e('div',{className:'status-id-line'},'Application ',app.id,' · To ',app.endUser,' · ',app.destination),
          e('div',{style:{display:'flex',gap:10,marginTop:8,marginBottom:16,alignItems:'center'}},
            e('span',{className:'app-status status-'+app.statusKey},app.status),
            isInProgress && e('span',{style:{fontSize:12,color:'var(--text-dimmer)'}},'Estimated decision: 25-35 business days')
          ),
          e('div',{className:'timeline'},
            timeline.map((t,i)=>e('div',{key:i,className:'timeline-item '+t.status},
              e('div',{className:'timeline-dot'}),
              e('div',{className:'timeline-title'},t.title),
              e('div',{className:'timeline-when'},t.when),
              e('div',{className:'timeline-body'},t.body)
            ))
          )
        ),
        e('div',{className:'status-side'},
          e('div',{className:'status-info-card'},
            e('div',{className:'status-info-title'},'Application details'),
            e('div',{className:'status-info-row'},e('div',{className:'status-info-key'},'ECCN'),e('div',{className:'status-info-val'},app.eccn||'1C010.e')),
            e('div',{className:'status-info-row'},e('div',{className:'status-info-key'},'Quantity'),e('div',{className:'status-info-val'},app.quantity||'—')),
            e('div',{className:'status-info-row'},e('div',{className:'status-info-key'},'Total value'),e('div',{className:'status-info-val'},app.value||'—')),
            e('div',{className:'status-info-row'},e('div',{className:'status-info-key'},'Filed'),e('div',{className:'status-info-val'},app.filed))
          ),
          e('div',{className:'status-info-card'},
            e('div',{className:'status-info-title'},'Licensing officer'),
            e('div',{style:{display:'flex',alignItems:'center',gap:12,marginBottom:14}},
              e('div',{style:{width:40,height:40,borderRadius:'50%',background:'linear-gradient(135deg,#5aa9ff,#3878c8)',display:'flex',alignItems:'center',justifyContent:'center',fontWeight:700,fontSize:14}},'RK'),
              e('div',null,
                e('div',{style:{fontSize:14,fontWeight:600}},isInProgress?'Assignment pending':'Rachel Kim'),
                e('div',{style:{fontSize:12,color:'var(--text-dimmer)'}},isInProgress?'Within 1 business day':'Category 1 · Materials')
              )
            ),
            !isInProgress && e('button',{className:'btn btn-secondary',style:{width:'100%',padding:'10px',fontSize:13}},'Send message')
          ),
          e('div',{className:'status-info-card'},
            e('div',{className:'status-info-title'},'Ask the assistant'),
            e('div',{style:{fontSize:13.5,color:'var(--text-dim)',lineHeight:1.55,marginBottom:14}},"Questions about this application? Ask in plain English."),
            e('button',{className:'btn btn-secondary',style:{width:'100%',padding:'10px',fontSize:13},onClick:()=>window.dispatchEvent(new CustomEvent('open-agent'))},'Open assistant →')
          )
        )
      )
    ),
    e(Footer,{setRoute})
  );
}

/* ============================================================
   AGENT — persistent chat drawer
   ============================================================ */
function AgentDrawer({open,setOpen,signedIn}){
  const [messages,setMessages] = useState([
    signedIn
      ? {role:'bot',text:"Hi Elena — I've got context on your account and your active applications. Ask me anything about export licensing, your filings, or the EAR."}
      : {role:'bot',text:"Hi — I'm the BIS export licensing assistant. Ask me about ECCNs, licenses, screening, or how the EAR works. I have the full text of the regulations."}
  ]);
  const [input,setInput] = useState('');
  const [typing,setTyping] = useState(false);
  const bodyRef = useRef(null);

  useEffect(()=>{
    if(bodyRef.current) bodyRef.current.scrollTop = bodyRef.current.scrollHeight;
  },[messages,typing]);

  useEffect(()=>{
    const handler = ()=>setOpen(true);
    window.addEventListener('open-agent',handler);
    return ()=>window.removeEventListener('open-agent',handler);
  },[setOpen]);

  const send = (text)=>{
    const q = (text||input).trim();
    if(!q) return;
    setMessages(m=>[...m,{role:'user',text:q}]);
    setInput('');
    setTyping(true);
    setTimeout(()=>{
      setMessages(m=>[...m,{role:'bot',text:agentReply(q)}]);
      setTyping(false);
    },700);
  };

  const suggestions = signedIn
    ? ['Status of my in-progress application?','What license exceptions apply to Japan?','Show my past filings to the UK']
    : ['What is an ECCN?','Do I need a license?','How do I classify my item?'];

  return e(React.Fragment,null,
    e('button',{className:'agent-fab',onClick:()=>setOpen(o=>!o),title:'Ask the assistant'},
      e('span',{className:'agent-fab-pulse'}),
      open ? '×' : '✦'
    ),
    e('div',{className:'agent-drawer'+(open?' open':'')},
      e('div',{className:'agent-head'},
        e('div',{className:'agent-avatar'},'✦'),
        e('div',null,
          e('div',{className:'agent-name'},'BIS Assistant'),
          e('div',{className:'agent-status'},e('span',{className:'dot'}),'Online · reads the EAR in full')
        ),
        e('button',{className:'agent-close',onClick:()=>setOpen(false)},'×')
      ),
      e('div',{className:'agent-body',ref:bodyRef},
        messages.map((m,i)=>e('div',{key:i,className:'agent-msg '+m.role},m.text)),
        typing && e('div',{className:'agent-typing'},e('span'),e('span'),e('span')),
        messages.length<=1 && e('div',{className:'agent-suggestions'},
          suggestions.map(s=>e('button',{key:s,className:'agent-suggest',onClick:()=>send(s)},s))
        )
      ),
      e('div',{className:'agent-input-wrap'},
        e('input',{
          className:'agent-input',
          placeholder:'Ask a question...',
          value:input,
          onChange:ev=>setInput(ev.target.value),
          onKeyDown:ev=>{if(ev.key==='Enter')send()}
        }),
        e('button',{className:'agent-send',onClick:()=>send()},'↑')
      )
    )
  );
}

/* ============================================================
   APP — router
   ============================================================ */
function App(){
  const [route,setRoute] = useState('home');
  const [signedIn,setSignedIn] = useState(false);
  const [activeApp,setActiveApp] = useState(null);
  const [agentOpen,setAgentOpen] = useState(false);

  useEffect(()=>{window.scrollTo(0,0)},[route]);

  const onSignIn = ()=>{
    setSignedIn(true);
    setRoute('dashboard');
  };

  const wrapped = (content)=>e(React.Fragment,null,
    e('div',{className:'proto-banner'},'Prototype',e('span',null,'· Concept only. Not affiliated with the U.S. Government or the Bureau of Industry and Security.')),
    e(Nav,{route,setRoute,signedIn,setSignedIn}),
    e('div',{className:'page'},content),
    e(AgentDrawer,{open:agentOpen,setOpen:setAgentOpen,signedIn})
  );

  switch(route){
    case 'home': return wrapped(e(Home,{setRoute}));
    case 'licensing': return wrapped(e(LicensingPage,{setRoute,signedIn}));
    case 'regulations': return wrapped(e(RegulationsPage,{setRoute}));
    case 'enforcement': return wrapped(e(EnforcementPage,{setRoute}));
    case 'learn': return wrapped(e(LearnPage,{setRoute}));
    case 'news': return wrapped(e(NewsPage,{setRoute}));
    case 'about': return wrapped(e(AboutPage,{setRoute}));
    case 'signin': return wrapped(e(SignInPage,{onSignIn,setRoute}));
    case 'dashboard': return wrapped(e(Dashboard,{setRoute,setActiveApp}));
    case 'application': return wrapped(e(ApplicationFlow,{setRoute,activeApp,setActiveApp}));
    case 'status': return wrapped(e(StatusPage,{setRoute,activeApp}));
    default: return wrapped(e(Home,{setRoute}));
  }
}

ReactDOM.createRoot(document.getElementById('root')).render(e(App));
</script>
</body>
